apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-ds-e2e
  namespace: kpr-e2e-test
  labels:
    app: nginx-ds-e2e
spec:
  selector:
    matchLabels:
      app: nginx-ds-e2e
  template:
    metadata:
      labels:
        app: nginx-ds-e2e
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
