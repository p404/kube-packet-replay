apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-e2e
  namespace: kpr-e2e-test
  labels:
    app: nginx-e2e
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-e2e
  template:
    metadata:
      labels:
        app: nginx-e2e
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-e2e
  namespace: kpr-e2e-test
  labels:
    app: nginx-e2e
spec:
  type: ClusterIP
  selector:
    app: nginx-e2e
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
