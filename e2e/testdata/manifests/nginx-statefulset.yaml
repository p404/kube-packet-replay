apiVersion: v1
kind: Service
metadata:
  name: nginx-sts-e2e
  namespace: kpr-e2e-test
  labels:
    app: nginx-sts-e2e
spec:
  clusterIP: None
  selector:
    app: nginx-sts-e2e
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-sts-e2e
  namespace: kpr-e2e-test
  labels:
    app: nginx-sts-e2e
spec:
  replicas: 1
  serviceName: nginx-sts-e2e
  selector:
    matchLabels:
      app: nginx-sts-e2e
  template:
    metadata:
      labels:
        app: nginx-sts-e2e
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
